<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>抖音作品详情测试 - DouK-Downloader</title>
  <style>
    :root {
      --bg: #0f0f12;
      --card: #1a1a1f;
      --border: #2a2a32;
      --text: #e4e4e7;
      --muted: #71717a;
      --accent: #22c55e;
      --accent-hover: #16a34a;
      --error: #ef4444;
      --link: #3b82f6;
    }
    * { box-sizing: border-box; }
    body {
      font-family: "SF Pro Text", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      min-height: 100vh;
      padding: 2rem;
      line-height: 1.6;
    }
    .container {
      max-width: 720px;
      margin: 0 auto;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    .subtitle {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 0.4rem;
      color: var(--muted);
    }
    input[type="text"], textarea {
      width: 100%;
      padding: 0.75rem 1rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.95rem;
      margin-bottom: 1rem;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
    }
    textarea { min-height: 60px; resize: vertical; }
    .row { display: flex; gap: 1rem; flex-wrap: wrap; }
    .row > * { flex: 1; min-width: 200px; }
    button {
      background: var(--accent);
      color: #000;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: var(--accent-hover); }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .result {
      margin-top: 1.5rem;
    }
    .result.success .msg { color: var(--accent); }
    .result.error .msg { color: var(--error); }
    .result .msg { font-weight: 500; margin-bottom: 0.5rem; }
    .detail-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      margin-top: 1rem;
      font-size: 0.9rem;
    }
    .detail-box dt { color: var(--muted); margin-top: 0.75rem; }
    .detail-box dt:first-child { margin-top: 0; }
    .detail-box dd { margin: 0.25rem 0 0 0; }
    .downloads {
      margin-top: 1rem;
    }
    .downloads a {
      display: block;
      color: var(--link);
      word-break: break-all;
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--border);
    }
    .downloads a:last-of-type { border-bottom: none; }
    .downloads a:hover { text-decoration: underline; }
    .hidden { display: none; }
    .spinner {
      display: inline-block;
      width: 1rem;
      height: 1rem;
      border: 2px solid transparent;
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <h1>抖音作品详情测试</h1>
    <p class="subtitle">调用 DouK-Downloader API：POST /douyin/detail</p>

    {% if error %}
    <div class="card result error">
      <p class="msg">下载失败：{{ error }}</p>
    </div>
    {% endif %}

    <div class="card">
      <form id="form">
        <label for="link">作品链接 *</label>
        <input
          type="text"
          id="link"
          name="link"
          placeholder="https://www.douyin.com/video/7201234567890123456 或 v.douyin.com 短链接"
          required
        />

        <div class="row">
          <div>
            <label for="cookie">Cookie（可选）</label>
            <textarea id="cookie" name="cookie" placeholder="需要登录态时填写"></textarea>
          </div>
          <div>
            <label for="proxy">代理（可选）</label>
            <input type="text" id="proxy" name="proxy" placeholder="http://127.0.0.1:7890" />
          </div>
        </div>

        <button type="submit" id="btn">
          <span id="btnText">获取作品数据</span>
        </button>
      </form>
    </div>

    <div id="result" class="card result hidden"></div>
  </div>

  <script>
    const form = document.getElementById("form");
    const resultEl = document.getElementById("result");
    const btn = document.getElementById("btn");
    const btnText = document.getElementById("btnText");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      resultEl.classList.add("hidden");
      btn.disabled = true;
      btnText.innerHTML = '<span class="spinner"></span> 请求中...';

      const link = document.getElementById("link").value.trim();
      const cookie = document.getElementById("cookie").value.trim();
      const proxy = document.getElementById("proxy").value.trim();

      try {
        const res = await fetch("/api/detail", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ link, cookie, proxy }),
        });
        const data = await res.json();
        renderResult(data);
      } catch (err) {
        renderResult({ success: false, message: "请求失败: " + err.message, data: null });
      } finally {
        btn.disabled = false;
        btnText.textContent = "获取作品数据";
      }
    });

    function renderResult(data) {
      resultEl.classList.remove("hidden");
      resultEl.classList.remove("success", "error");
      resultEl.classList.add(data.success ? "success" : "error");

      if (data.success && data.data) {
        const d = data.data;
        let html = `<p class="msg">${escapeHtml(data.message)}</p>`;
        html += `<div class="detail-box">`;
        html += `<dl>`;
        html += `<dt>作品 ID</dt><dd>${escapeHtml(d.id || data.detail_id || "-")}</dd>`;
        html += `<dt>类型</dt><dd>${escapeHtml(d.type || "-")}</dd>`;
        html += `<dt>描述</dt><dd>${escapeHtml(d.desc || "-")}</dd>`;
        const author = d.nickname || (d.author && (d.author.nickname || d.author.unique_id));
        html += `<dt>作者</dt><dd>${escapeHtml(author || "-")}</dd>`;
        html += `<dt>点赞</dt><dd>${escapeHtml(d.digg_count ?? d.statistics?.digg_count ?? "-")}</dd>`;
        html += `<dt>评论</dt><dd>${escapeHtml(d.comment_count ?? d.statistics?.comment_count ?? "-")}</dd>`;
        html += `</dl>`;
        const urls = Array.isArray(d.downloads) ? d.downloads : (d.downloads ? [d.downloads] : []);
        if (urls.length) {
          html += `<div class="downloads"><strong>下载：</strong>`;
          urls.forEach((url, i) => {
            const proxyUrl = "/download?url=" + encodeURIComponent(url);
            const label = urls.length > 1 ? `下载 ${i + 1}` : "点击下载";
            html += `<a href="${proxyUrl}" target="_blank" rel="noopener">${label}</a>`;
          });
          html += `</div>`;
        }
        html += `</div>`;
        resultEl.innerHTML = html;
      } else {
        resultEl.innerHTML = `<p class="msg">${escapeHtml(data.message || "获取失败")}</p>`;
      }
    }

    function escapeHtml(s) {
      if (s == null) return "-";
      const div = document.createElement("div");
      div.textContent = String(s);
      return div.innerHTML;
    }
  </script>
</body>
</html>
